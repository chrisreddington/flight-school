# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions-all:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - major
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # TypeScript 6 is blocked by madge@8.0.0 declaring peerOptional
      # typescript@^5.4.4, which excludes TS 6.x. Runtime compat looks fine
      # (madge -> dependency-tree -> detective-typescript@14.1.2 already
      # accepts TS ^5.4.4 || ^6.0.2), but `npm ci` fails ERESOLVE before
      # any code runs. Tracking issue in this repo lists the exit checklist;
      # upstream tracking: pahen/madge#462 and pahen/madge#460.
      # Remove this rule once madge ships a release whose peer accepts TS 6.
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
