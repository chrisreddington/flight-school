# Path scope for the web (Next.js) deployment.
# Consumed by `dorny/paths-filter` in `.github/workflows/deploy-web.yml`.
# Lives outside `.github/workflows/` because anything in that directory
# is parsed by GitHub as a workflow definition.
web:
  - 'src/app/**'
  - 'src/components/**'
  - 'src/contexts/**'
  - 'src/hooks/**'
  - 'src/instrumentation.ts'
  - 'src/lib/**'
  - 'src/proxy.ts'
  - 'src/styles/**'
  - 'Dockerfile'
  - '.dockerignore'
  - 'next.config.ts'
  - 'package.json'
  - 'package-lock.json'
  - 'tsconfig.json'
  - '.github/workflows/deploy-web.yml'
  - '.github/path-filters/web.yml'
