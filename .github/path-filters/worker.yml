# Path scope for the Copilot worker (Hono/Node) deployment.
# Consumed by `dorny/paths-filter` in `.github/workflows/deploy-worker.yml`.
# Lives outside `.github/workflows/` because anything in that directory
# is parsed by GitHub as a workflow definition.
worker:
  - 'src/worker/**'
  - 'src/lib/**'
  - 'Dockerfile.worker'
  - '.dockerignore'
  - 'scripts/build-worker.mjs'
  - 'scripts/worker-esbuild-config.mjs'
  - 'scripts/server-only-shim.mjs'
  - 'package.json'
  - 'package-lock.json'
  - 'tsconfig.json'
  - '.github/workflows/deploy-worker.yml'
  - '.github/path-filters/worker.yml'
