name: Deploy web (Azure Container Apps)

# Deploys the Next.js web image to Azure Container Apps. Triggered
# automatically when CI succeeds on `main` and the in-scope paths
# (see `.github/path-filters/web.yml`) have changed since the
# previous successful deploy. `workflow_dispatch` is the rollback /
# replay path and requires an explicit SHA.
#
# Architecture: see `docs/deployment-aca.md` and the plan artefact
# `files/deploy-decouple-plan.md` in the session store.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy (required for manual rollouts).'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Shared with deploy-worker.yml — a single shared-lib push triggers
  # both workflows for the same CI completion; the shared group
  # serialises them so two concurrent ARM deployments cannot read
  # each other's stale tag. `cancel-in-progress: false` because
  # `az deployment sub create` submits a server-side ARM operation
  # that GH Actions cannot abort; cancelling the runner would leak
  # an in-flight Azure deployment.
  group: deploy-aca-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  should-deploy:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      # `gh api /repos/.../compare/...` (ancestry check) uses
      # `contents: read`. `gh api /repos/.../actions/runs`
      # (CI-green check) needs `actions: read`. Scoped to this job
      # so the deploy job does not inherit `actions: read`.
      contents: read
      actions: read
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      sha: ${{ steps.sha.outputs.value }}
      sha_short: ${{ steps.sha.outputs.short }}
    steps:
      - name: Validate required vars
        env:
          AZURE_CLIENT_ID:        ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:        ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID:  ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ACR_LOGIN_SERVER:       ${{ vars.ACR_LOGIN_SERVER }}
          ACR_NAME:               ${{ vars.ACR_NAME }}
          APP_NAME:               ${{ vars.APP_NAME }}
          RESOURCE_GROUP_NAME:    ${{ vars.RESOURCE_GROUP_NAME }}
          LOCATION:               ${{ vars.LOCATION }}
        run: |
          set -euo pipefail
          missing=()
          for v in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID \
                   ACR_LOGIN_SERVER ACR_NAME APP_NAME RESOURCE_GROUP_NAME LOCATION; do
            [[ -z "${!v:-}" ]] && missing+=("$v")
          done
          (( ${#missing[@]} )) && { echo "::error::Missing vars: ${missing[*]}"; exit 1; }
          [[ "$ACR_LOGIN_SERVER" != "${ACR_NAME}.azurecr.io" ]] && \
            { echo "::error::ACR_LOGIN_SERVER does not match \${ACR_NAME}.azurecr.io"; exit 1; }
          true

      - name: Resolve deploy SHA
        id: sha
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_SHA:   ${{ github.event.workflow_run.head_sha }}
          INPUT_SHA:     ${{ inputs.sha }}
        run: |
          set -euo pipefail
          case "$GH_EVENT_NAME" in
            workflow_run)      sha="$WR_HEAD_SHA"  ;;
            workflow_dispatch) sha="$INPUT_SHA"    ;;
            *)                 echo "::error::unsupported event"; exit 1 ;;
          esac
          # SHA shape validation — 40-char lowercase hex. The
          # workflow_run path is GitHub-controlled and always
          # satisfies this; the workflow_dispatch path is
          # operator-supplied and could in principle be a tag,
          # branch name, or shell payload. Reject anything else
          # before it reaches checkout or docker.
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || \
            { echo "::error::invalid SHA: '$sha' (must be 40-hex)"; exit 1; }
          echo "value=$sha" >> "$GITHUB_OUTPUT"
          # Short SHA for the ARM deployment name. Azure
          # subscription-scope deployment names are capped at 64
          # chars; full SHA (40) plus prefix plus run_id plus
          # run_attempt can land at 61–64 and break on high-run-id
          # repos. 12 hex chars retain collision resistance for
          # human-scale operator browsing while leaving headroom.
          echo "short=${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Checkout deploy SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ steps.sha.outputs.value }}
          fetch-depth: 0

      - name: Verify SHA is reachable from origin/main
        # Belt-and-braces for the workflow_dispatch path. The
        # workflow_run path's head_sha is provably on main (the
        # gate's job-level `if:` enforces it), so we skip this
        # step for that event. Uses GitHub's Compare API rather
        # than `git merge-base` so the check works for rollback
        # SHAs of any age without needing a deep local clone.
        if: github.event_name == 'workflow_dispatch'
        env:
          SHA:      ${{ steps.sha.outputs.value }}
          GH_REPO:  ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(gh api "/repos/${GH_REPO}/compare/main...${SHA}" --jq '.status')
          case "$status" in
            identical|behind) ;;
            *) echo "::error::SHA $SHA is not reachable from main (compare status='$status')"; exit 1 ;;
          esac

      - name: Refuse stale workflow_run (head_sha != current main HEAD)
        # CI can complete out of order. If commit B is at `main`
        # HEAD and commit A's CI finishes later, A's workflow_run
        # would otherwise deploy A — silently rolling main back.
        # The deploy workflow only ever rolls forward;
        # `workflow_dispatch` is the explicit rollback path. The
        # deploy job re-checks main HEAD just before build/push
        # to close the gap where a newer commit lands while this
        # run is queued in the concurrency group.
        if: github.event_name == 'workflow_run'
        id: stale
        env:
          SHA:      ${{ steps.sha.outputs.value }}
          GH_REPO:  ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tip=$(gh api "/repos/${GH_REPO}/branches/main" --jq '.commit.sha')
          if [[ "$tip" == "$SHA" ]]; then
            echo "superseded=false" >> "$GITHUB_OUTPUT"
          else
            echo "superseded=true" >> "$GITHUB_OUTPUT"
            echo "::warning::superseded — main HEAD is $tip, this run is for $SHA"
          fi

      - name: Verify CI was green for dispatched SHA
        # workflow_run already implies CI success for the SHA. For
        # workflow_dispatch we must verify ourselves — otherwise
        # an operator could deploy a SHA whose CI is red. Query
        # CI by workflow file path (ci.yml), not by display name,
        # so a display-name rename does not silently break the
        # check.
        if: github.event_name == 'workflow_dispatch'
        env:
          SHA:     ${{ steps.sha.outputs.value }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusion=$(gh api "/repos/${GH_REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&event=push&status=completed&per_page=10" \
            --jq '.workflow_runs | first | .conclusion // empty')
          [[ "$conclusion" == "success" ]] || \
            { echo "::error::No successful CI run found for SHA $SHA (conclusion='$conclusion')"; exit 1; }

      - name: Resolve filter base (previous successful CI head_sha)
        # `dorny/paths-filter` needs a base SHA to diff against.
        # `$SHA~1` is wrong for multi-commit pushes (it only sees
        # the tip commit). The robust base is the head_sha of the
        # most recent earlier successful CI run on main —
        # everything between that and the current SHA is "what
        # this push delivers". Constrain to runs with
        # `id < CURRENT_RUN_ID` so a newer successful run cannot
        # be picked as base. `per_page=100` is the GH API max for
        # this endpoint.
        if: github.event_name == 'workflow_run' && steps.stale.outputs.superseded == 'false'
        id: filter-base
        env:
          SHA:            ${{ steps.sha.outputs.value }}
          GH_REPO:        ${{ github.repository }}
          GH_TOKEN:       ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          base=$(gh api "/repos/${GH_REPO}/actions/workflows/ci.yml/runs?branch=main&status=success&event=push&per_page=100" \
            --jq "[.workflow_runs[] | select(.id < $CURRENT_RUN_ID)] | first | .head_sha // empty")
          if [[ -z "$base" ]]; then
            # First-ever workflow_run deploy: no prior successful
            # CI on main exists. Skip paths-filter and deploy
            # unconditionally — there's no meaningful diff to
            # compute, and the first deploy of every app must run.
            echo "first_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Hard-assert the base commit is reachable locally.
          # With `fetch-depth: 0` it always is, but a missing
          # object here would silently fall back to paths-filter
          # mis-diffing, so we fail loudly instead.
          git cat-file -e "${base}^{commit}" || \
            { echo "::error::filter base $base not present in local checkout (fetch-depth: 0 expected)"; exit 1; }
          echo "first_deploy=false" >> "$GITHUB_OUTPUT"
          echo "value=$base" >> "$GITHUB_OUTPUT"

      - name: Paths filter (workflow_run only)
        id: filter
        if: github.event_name == 'workflow_run' && steps.stale.outputs.superseded == 'false' && steps.filter-base.outputs.first_deploy == 'false'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        with:
          ref:  ${{ steps.sha.outputs.value }}
          base: ${{ steps.filter-base.outputs.value }}
          filters: .github/path-filters/web.yml

      - name: Decide whether to proceed
        id: gate
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          FILTER_HIT:    ${{ steps.filter.outputs.web }}
          SUPERSEDED:    ${{ steps.stale.outputs.superseded }}
          FIRST_DEPLOY:  ${{ steps.filter-base.outputs.first_deploy }}
        run: |
          set -euo pipefail
          if [[ "$SUPERSEDED" == 'true' ]]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Superseded by newer main HEAD; deploy skipped."
          elif [[ "$GH_EVENT_NAME" == 'workflow_dispatch' ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [[ "$FIRST_DEPLOY" == 'true' ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::First-ever deploy; paths-filter bypassed."
          elif [[ "$FILTER_HIT" == 'true' ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No in-scope paths changed; deploy skipped."
          fi

  deploy:
    needs: should-deploy
    if: needs.should-deploy.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # Subscription-scope deployment names must be unique per
      # submission AND fit in 64 chars; we use a 12-char short SHA
      # (collision-resistant within a single repo's history) plus
      # run_id + run_attempt so retries are distinct.
      DEPLOY_NAME: web-${{ needs.should-deploy.outputs.sha_short }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.should-deploy.outputs.sha }}
          fetch-depth: 1

      - name: Refuse stale deploy (concurrency-queue TOCTOU guard)
        # The `should-deploy` stale-check runs at queue time. The
        # shared concurrency group can hold this job for several
        # minutes while another deploy runs; during that window a
        # newer commit may have landed on main and already been
        # deployed. Re-check main HEAD here so we never overwrite
        # a newer successful deploy with an older SHA.
        # `workflow_dispatch` (the explicit rollback path)
        # bypasses this guard.
        if: github.event_name == 'workflow_run'
        env:
          SHA:      ${{ needs.should-deploy.outputs.sha }}
          GH_REPO:  ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tip=$(gh api "/repos/${GH_REPO}/branches/main" --jq '.commit.sha')
          [[ "$tip" == "$SHA" ]] || \
            { echo "::error::superseded — main HEAD is $tip, refusing to deploy $SHA"; exit 1; }

      - name: Validate parameters.json
        # Fail-fast guard before any build, ACR push, or Azure
        # call. Rejects placeholder values and the legacy
        # `imageTag` key — both indicate a stale rollback SHA.
        run: |
          set -euo pipefail
          f=infra/main.parameters.json
          if grep -iE '"<[^"]+>"|REPLACE_ME|your-[a-z0-9-]+|TODO' "$f" >/dev/null; then
            echo "::error::$f contains placeholder values"; exit 1
          fi
          if grep -E '"imageTag"\s*:' "$f" >/dev/null; then
            echo "::error::$f still defines legacy 'imageTag' — remove it (CD passes webImageTag/workerImageTag explicitly). If rolling back to a pre-migration commit, deploy from main HEAD with an --image-only override instead."; exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.node-version'
      - run: npm ci
      - run: npm run lint && npm run check:guardrails
      - run: npm run build && npm run check:web-image

      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474  # v2.3.0
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: az acr login --name "$ACR_NAME"

      - name: Build + push image
        env:
          SHA:              ${{ needs.should-deploy.outputs.sha }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          APP_NAME:         ${{ vars.APP_NAME }}
        run: |
          set -euo pipefail
          IMAGE_TAG="sha-$SHA"
          IMAGE="${ACR_LOGIN_SERVER}/${APP_NAME}:${IMAGE_TAG}"
          docker buildx build --push -f Dockerfile -t "$IMAGE" .
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Read other app's current template image tag
        # Reads the desired-state image tag from the worker app's
        # Container App template (what Bicep last applied). This
        # is not necessarily the actively-serving revision's
        # image — if an earlier revision failed readiness, ACA
        # may still be routing to the previous revision. For
        # tag-propagation this is correct: Bicep redeploys
        # re-apply the template, so the template tag is what the
        # next deploy would produce anyway.
        env:
          APP_NAME:            ${{ vars.APP_NAME }}
          RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
          ACR_LOGIN_SERVER:    ${{ vars.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail
          # OTHER_APP_NAME is the Container App **resource** name
          # (used with `--name`); OTHER_CONTAINER_NAME is the
          # **container** name inside that resource's template
          # (used in the JMESPath filter). For the worker app
          # they differ — see `infra/modules/copilot-worker-app.bicep`,
          # which sets `var workerName = '${appName}-worker'` for
          # the resource and hardcodes the container's
          # `name: 'copilot-worker'`.
          OTHER_APP_NAME="${APP_NAME}-worker"
          OTHER_CONTAINER_NAME="copilot-worker"
          # Query the worker app's main container by name (not by
          # positional index) so a future sidecar appended to the
          # template's container list cannot silently mis-select
          # the wrong image.
          OTHER_IMAGE=$(az containerapp show \
            --name "$OTHER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --query "properties.template.containers[?name=='$OTHER_CONTAINER_NAME'].image | [0]" -o tsv)
          [[ -z "$OTHER_IMAGE" || "$OTHER_IMAGE" == "None" ]] && \
            { echo "::error::worker app has no template image for container '$OTHER_CONTAINER_NAME' in resource '$OTHER_APP_NAME' (verify Container App resource exists and container naming matches infra/modules/copilot-worker-app.bicep)"; exit 1; }
          EXPECTED_PREFIX="${ACR_LOGIN_SERVER}/${OTHER_APP_NAME}:"
          [[ "$OTHER_IMAGE" == "${EXPECTED_PREFIX}"* ]] || \
            { echo "::error::other app image '$OTHER_IMAGE' does not match expected prefix '$EXPECTED_PREFIX'"; exit 1; }
          echo "OTHER_TAG=${OTHER_IMAGE##*:}" >> "$GITHUB_ENV"

      - name: Deploy via Bicep
        env:
          LOCATION:            ${{ vars.LOCATION }}
          APP_NAME:            ${{ vars.APP_NAME }}
          RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
          ACR_LOGIN_SERVER:    ${{ vars.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail
          az deployment sub create \
            --name "$DEPLOY_NAME" \
            --location "$LOCATION" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters \
              appName="$APP_NAME" \
              resourceGroupName="$RESOURCE_GROUP_NAME" \
              acrLoginServer="$ACR_LOGIN_SERVER" \
              location="$LOCATION" \
              webImageTag="$IMAGE_TAG" \
              workerImageTag="$OTHER_TAG" \
            --only-show-errors

      - name: Cancel in-flight deployment on runner cancellation
        if: cancelled()
        run: |
          az deployment sub cancel --name "$DEPLOY_NAME" --only-show-errors || true
